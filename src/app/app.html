<router-outlet *ngIf="telaLogin"></router-outlet>

<button
  *ngIf="telaLogin"
  type="button"
  class="theme-toggle"
  (click)="alternarTema()"
  [attr.aria-label]="temaEscuro ? 'Ativar tema claro' : 'Ativar tema escuro'"
  [attr.title]="temaEscuro ? 'Ativar tema claro' : 'Ativar tema escuro'"
>
  <span aria-hidden="true">{{ temaEscuro ? '☀️' : '🌙' }}</span>
  <span>{{ temaEscuro ? 'Tema claro' : 'Tema escuro' }}</span>
</button>

<div *ngIf="!telaLogin" class="app-shell-surface min-h-screen lg:flex">
  <app-sidebar *ngIf="layoutMecanico"></app-sidebar>
  <app-sidebar-cliente *ngIf="!layoutMecanico"></app-sidebar-cliente>

  <div class="flex min-w-0 flex-1 flex-col">
    <app-topbar *ngIf="layoutMecanico"></app-topbar>
    <app-topbar-cliente *ngIf="!layoutMecanico"></app-topbar-cliente>

    <div class="theme-toggle-row">
      <button
        type="button"
        class="theme-toggle page-theme-toggle"
        (click)="alternarTema()"
        [attr.aria-label]="temaEscuro ? 'Ativar tema claro' : 'Ativar tema escuro'"
        [attr.title]="temaEscuro ? 'Ativar tema claro' : 'Ativar tema escuro'"
      >
        <span aria-hidden="true">{{ temaEscuro ? '☀️' : '🌙' }}</span>
        <span>{{ temaEscuro ? 'Tema claro' : 'Tema escuro' }}</span>
      </button>
    </div>

    <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
      <router-outlet></router-outlet>
    </main>
  </div>


</div>
