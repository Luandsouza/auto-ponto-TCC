<main class="landing-page">
  <a
    routerLink="/cliente"
    class="landing-panel landing-panel-client"
    [style.backgroundImage]="'url(' + clienteImagem + ')'"
    aria-label="Entrar na área do cliente"
  >
    <div class="landing-brand">
      <img src="/logo4.jpg" alt="Auto Ponto" />
    </div>

    <div class="landing-content">
      <p>Portal do cliente</p>
      <h1>Área do Cliente</h1>
      <span>Acompanhe agenda, histórico e status dos serviços do seu veículo.</span>
    </div>
  </a>

  <a
    routerLink="/mecanico"
    class="landing-panel landing-panel-workshop"
    [style.backgroundImage]="'url(' + oficinaImagem + ')'"
    aria-label="Entrar na área do mecânico"
  >
    <div class="landing-content">
      <p>Central do mecânico</p>
      <h2>Área do Mecânico</h2>
      <span>Gerencie serviços, estoque, financeiro, relatórios e operação mecânica.</span>
    </div>
  </a>
</main>
