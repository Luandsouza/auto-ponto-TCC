<main class="min-h-screen bg-slate-50 p-6">

    <section class="mx-auto max-w-6xl">


        <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">

            <div>
                <h1 class="text-3xl font-black text-auto-navy">Agenda de Serviços</h1>
                <p class="text-sm text-slate-500 mt-1">
                    Gerencie seu agendamentos
                </p>
            </div>

            <!-- routerLink="/cliente/agendar" -->
            <button (click)="abrirModal()"
                class="rounded-md bg-auto-orange px-5 py-2 text-sm font-black text-white hover:opacity-90 transition">
                + Agendar
            </button>

        </div>


        <div class="mb-6">
            <input type="search" placeholder="Buscar pelo agendamento..."
                class="w-full rounded-md border border-slate-300 bg-white p-3 text-sm focus:border-auto-blue focus:outline-none focus:ring-2 focus:ring-auto-sky" />
        </div>


        <div class="overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm">

            <div class="overflow-x-auto">

                <table class="min-w-full text-sm">

                    <thead class="bg-auto-navy text-white">
                        <tr>
                            <th class="px-4 py-3 text-left font-bold">ID</th>
                            <th class="px-4 py-3 text-left font-bold">Automóvel</th>
                            <th class="px-4 py-3 text-left font-bold">Serviço</th>
                            <th class="px-4 py-3 text-left font-bold">Data</th>
                            <th class="px-4 py-3 text-left font-bold">Horário</th>
                            <th class="px-4 py-3 text-left font-bold">Observação</th>
                            <th class="px-4 py-3 text-left font-bold">Ações</th>
                        </tr>
                    </thead>

                    <tbody class="divide-y divide-slate-100">

                        <tr class="hover:bg-slate-50 transition">

                            <td class="px-4 py-3">01</td>
                            <td class="px-4 py-3">Corsa</td>
                            <td class="px-4 py-3">Troca de óleo</td>
                            <td class="px-4 py-3">01/01/2001</td>
                            <td class="px-4 py-3">00:00</td>
                            <td class="px-4 py-3">Verificar freios</td>


                            <td class="px-4 py-3">
                                <div class="flex gap-2">

                                    <button
                                        class="rounded-md bg-auto-blue px-3 py-1 text-xs font-bold text-white hover:opacity-90 transition">
                                        Alterar
                                    </button>

                                    <button
                                        class="rounded-md bg-red-500 px-3 py-1 text-xs font-bold text-white hover:bg-red-600 transition">
                                        Excluir
                                    </button>

                                </div>
                            </td>
                        </tr>

                    </tbody>

                </table>

            </div>
        </div>

    </section>

</main>

<div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-6">

    <section class="w-full max-w-3xl rounded-lg bg-white shadow-lg border border-slate-200 overflow-hidden relative">


        <div class="bg-auto-navy p-6 text-white">
            <h1 class="text-3xl font-black">Agendamento</h1>
            <p class="mt-2 text-sm text-slate-200">
                Preencha os dados abaixo para agendar um serviço na oficina.
            </p>

            <button (click)="fecharModal()" class="text-gray-500 hover:text-gray-700 text-lg">
                ✖
            </button>
        </div>


        <div class="p-6 sm:p-8 grid gap-6">


            <div>
                <label for="automovel" class="block text-sm font-bold text-auto-navy mb-2">
                    Automóvel
                </label>
                <select name="automovel" id="automovel"
                    class="w-full rounded-md border border-slate-300 p-3 focus:border-auto-blue focus:outline-none focus:ring-2 focus:ring-auto-sky">
                    <option value="">Selecione</option>
                    <option value="hb20">HB20</option>
                    <option value="corsa">Corsa</option>
                </select>
            </div>


            <div>
                <label for="servico" class="block text-sm font-bold text-auto-navy mb-2">
                    Descrição do Serviço
                </label>
                <input type="text" placeholder="Ex: Troca de óleo"
                    class="w-full rounded-md border border-slate-300 p-3 focus:border-auto-blue focus:outline-none focus:ring-2 focus:ring-auto-sky" />
            </div>


            <div class="grid sm:grid-cols-2 gap-4">
                <div>
                    <label for="data" class="block text-sm font-bold text-auto-navy mb-2">
                        Data disponível
                    </label>
                    <input type="date"
                        class="w-full rounded-md border border-slate-300 p-3 focus:border-auto-blue focus:outline-none focus:ring-2 focus:ring-auto-sky" />
                </div>

                <div>
                    <label for="hora" class="block text-sm font-bold text-auto-navy mb-2">
                        Horário
                    </label>
                    <input type="time"
                        class="w-full rounded-md border border-slate-300 p-3 focus:border-auto-blue focus:outline-none focus:ring-2 focus:ring-auto-sky" />
                </div>
            </div>

            <!-- Observação -->
            <div>
                <label for="observacao" class="block text-sm font-bold text-auto-navy mb-2">
                    Observação
                </label>
                <input type="text" placeholder="Ex: Carro faz barulho ao frear"
                    class="w-full rounded-md border border-slate-300 p-3 focus:border-auto-blue focus:outline-none focus:ring-2 focus:ring-auto-sky" />
            </div>


            <div class="flex justify-end gap-3 pt-4">
                <button (click)="fecharModal()"
                    class="rounded-md border border-slate-300 px-5 py-2 text-sm font-bold text-slate-600 hover:bg-slate-100 transition">
                    Cancelar
                </button>

                <button
                    class="rounded-md bg-auto-orange px-5 py-2 text-sm font-black text-white hover:opacity-90 transition">
                    Salvar Agendamento
                </button>
            </div>

        </div>
    </section>
</div>
