<header class="mechanic-topbar sticky top-0 z-50">
  <div class="flex flex-col gap-4 px-4 py-4 sm:px-6 lg:flex-row lg:items-center lg:justify-between lg:px-8">
    <div class="flex min-w-0 items-center gap-4">
      <div class="grid h-12 w-12 shrink-0 place-items-center rounded-md bg-auto-orange text-white shadow-lg shadow-orange-500/20">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.3">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 17h18M6 17l1.4-5.4A2 2 0 0 1 9.3 10h5.4a2 2 0 0 1 1.9 1.6L18 17M8 14h.01M16 14h.01M7 17v2M17 17v2" />
        </svg>
      </div>

      <div class="min-w-0">
        <p class="text-xs font-black uppercase tracking-wide text-auto-orange">Central da oficina</p>
        <h1 class="truncate text-xl font-black text-auto-navy md:text-2xl">Operação mecânica</h1>
      </div>
    </div>

    <div class="flex flex-wrap items-center gap-3">
      <div class="topbar-chip">
        <span class="h-2.5 w-2.5 rounded-full bg-emerald-500"></span>
        <p>Oficina ativa</p>
      </div>

      <button
        aria-label="Notificações"
        class="relative grid h-11 w-11 place-items-center rounded-md border border-slate-200 bg-white text-auto-navy shadow-sm transition hover:border-auto-orange hover:text-auto-orange"
      >
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 0 0-4-5.7V4a2 2 0 1 0-4 0v1.3A6 6 0 0 0 6 11v3.2a2 2 0 0 1-.6 1.4L4 17h11zM9 17a3 3 0 0 0 6 0" />
        </svg>
        <span class="absolute -right-1 -top-1 grid h-5 min-w-5 place-items-center rounded-full border-2 border-white bg-auto-orange px-1 text-[10px] font-black text-white">
          {{ notificacoesPendentes }}
        </span>
      </button>

      <div class="topbar-profile flex items-center gap-3 rounded-md border border-slate-200 bg-white px-3 py-2 shadow-sm">
        <div class="grid h-10 w-10 place-items-center rounded-md bg-auto-sky font-black text-auto-blue">
          M
        </div>
        <div class="hidden sm:block">
          <p class="text-sm font-black text-auto-navy">Mecânico</p>
          <p class="text-xs font-semibold text-muted">Auto Ponto</p>
        </div>
      </div>
    </div>
  </div>
</header>
