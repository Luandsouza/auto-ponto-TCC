<aside class="mechanic-sidebar text-white lg:sticky lg:top-0 lg:h-screen lg:w-[19rem]">
  <div class="flex h-full min-h-screen flex-col">
    <div class="border-b border-white/10 px-5 py-5">
      <div class="rounded-md bg-white p-3 shadow-lg shadow-black/20">
        <img src="/logo4.jpg" alt="Auto Ponto" class="h-20 w-full object-contain" />
      </div>
      <div class="mt-4 flex items-center gap-3">
        <span class="grid h-10 w-10 place-items-center rounded-md bg-auto-orange text-white">
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.7 6.3a4 4 0 0 0 5 5L11 20l-5-5 8.7-8.7z" />
          </svg>
        </span>
        <div>
          <p class="text-xs font-bold uppercase tracking-wide text-slate-400">Oficina conectada</p>
          <p class="text-sm font-black text-white">Gestão mecânica</p>
        </div>
      </div>
    </div>

    <nav class="custom-scroll flex-1 space-y-1 overflow-y-auto px-3 py-5">
      <a
        *ngFor="let item of menuItems"
        [routerLink]="item.route"
        routerLinkActive="active-menu"
        [routerLinkActiveOptions]="{ exact: item.route === '/mecanica' }"
        class="menu-link group"
      >
        <span class="menu-icon realistic-icon" [style.--accent]="item.accent">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.35">
            <path
              *ngFor="let path of item.iconPaths"
              stroke-linecap="round"
              stroke-linejoin="round"
              [attr.d]="path"
            />
          </svg>
          <i></i>
        </span>

        <span class="min-w-0 flex-1 truncate">{{ item.label }}</span>
      </a>
    </nav>

    <div class="m-4 rounded-md border border-white/10 bg-white/8 p-4 shadow-inner">
      <div class="flex items-center justify-between gap-3">
        <p class="text-xs font-bold uppercase tracking-wide text-slate-400">Ritmo da oficina</p>
        <span class="h-2.5 w-2.5 rounded-full bg-emerald-400 shadow-[0_0_18px_rgba(52,211,153,0.9)]"></span>
      </div>
      <p class="mt-2 text-3xl font-black text-white">92%</p>
      <p class="mt-1 text-xs leading-5 text-slate-300">Operação estável para serviços, estoque e financeiro.</p>
    </div>
  </div>
</aside>
