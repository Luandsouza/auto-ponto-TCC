<aside class="client-sidebar text-auto-navy lg:sticky lg:top-0 lg:h-screen lg:w-72">
  <div class="flex h-full min-h-screen flex-col">
    <div class="border-b border-slate-200 px-5 py-5">
      <div class="rounded-md bg-white p-3 shadow-sm">
        <img src="/logo4.jpg" alt="Auto Ponto" class="h-20 w-full object-contain" />
      </div>
      <p class="mt-4 text-xs font-black uppercase tracking-wide text-auto-orange">Portal do cliente</p>
      <p class="text-sm font-black text-auto-navy">Acompanhamento do veículo</p>
    </div>

    <nav class="flex-1 space-y-2 px-4 py-5">
      <a
        *ngFor="let item of menuItems"
        [routerLink]="item.route"
        routerLinkActive="client-active-menu"
        [routerLinkActiveOptions]="{ exact: true }"
        class="client-menu-link group"
      >
        <span class="client-menu-icon client-realistic-icon" [style.--accent]="item.accent">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.35">
            <path
              *ngFor="let path of item.iconPaths"
              stroke-linecap="round"
              stroke-linejoin="round"
              [attr.d]="path"
            />
          </svg>
          <i></i>
        </span>

        <span class="min-w-0 flex-1 truncate">{{ item.label }}</span>
      </a>
    </nav>

    <div class="m-4 rounded-md border border-auto-blue/20 bg-auto-sky p-4">
      <p class="text-sm font-black text-auto-navy">Atendimento hoje</p>
      <p class="mt-1 text-3xl font-black text-auto-blue">92%</p>
      <p class="mt-1 text-xs font-semibold text-muted">Índice médio de satisfação dos clientes.</p>
    </div>
  </div>
</aside>
