<aside class="client-sidebar text-white lg:sticky lg:top-0 lg:h-screen lg:w-[19rem]">
  <div class="flex h-full min-h-screen flex-col">
    <div class="border-b border-white/10 px-5 py-5">
      <div class="rounded-md bg-white p-3 shadow-lg shadow-black/20">
        <img src="/logo4.jpg" alt="Auto Ponto" class="h-20 w-full object-contain" />
      </div>
      <div class="mt-4 flex items-center gap-3">
        <span class="grid h-10 w-10 place-items-center rounded-md bg-auto-orange text-white">
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.3" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 12 12 4l9 8v8H3v-8Zm5 8v-6h8v6" />
          </svg>
        </span>
        <div>
          <p class="text-xs font-bold uppercase tracking-wide text-slate-400">Portal do cliente</p>
          <p class="text-sm font-black text-white">Acompanhamento do veículo</p>
        </div>
      </div>
    </div>

    <nav class="client-scroll flex-1 space-y-1 overflow-y-auto px-3 py-5">
      <a
        *ngFor="let item of menuItems"
        [routerLink]="item.route"
        routerLinkActive="client-active-menu"
        [routerLinkActiveOptions]="{ exact: true }"
        class="client-menu-link group"
      >
        <span class="client-menu-icon client-realistic-icon" [style.--accent]="item.accent">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.35" aria-hidden="true">
            <path
              *ngFor="let path of item.iconPaths"
              stroke-linecap="round"
              stroke-linejoin="round"
              [attr.d]="path"
            />
          </svg>
          <i></i>
        </span>

        <span class="min-w-0 flex-1 truncate">{{ item.label }}</span>
      </a>
    </nav>

   
  </div>
</aside>
